<div class="container">
  <div class="row justify-content-center w-100">
    <div class="col-lg-5 col-md-8">
      <div class="card">
        <div class="card-header border-0 pb-0">
          <h3 class="text-center mb-0">
            <i class="bi bi-shield-lock"></i> Bank Data Intelijen
          </h3>
        </div>
        <div class="card-body">
          <p class="text-center text-muted small mb-4">Masuk untuk mengelola data intelijen kejaksaan</p>

          @if (errorText && !isLoading) {
            <div class="alert alert-danger border-0 rounded-3 mb-4 shadow-sm" style="background-color: #fef2f2; color: #991b1b;">
              <p class="small mb-0 text-center fw-medium">{{ errorText }}</p>
            </div>
          }

          @if (isLoading) {
            <div class="py-5 text-center">
              <app-loading-spinner></app-loading-spinner>
            </div>
          }

          @if (!isLoading) {
            <form #autForm="ngForm" (ngSubmit)="onSubmit(autForm)">
              <div class="form-floating mb-3">
                <input
                  class="form-control"
                  id="username"
                  type="text"
                  placeholder="Username"
                  ngModel
                  name="username"
                  required />
                  <label for="username">Username</label>
                </div>
                <div class="form-floating mb-4">
                  <input
                    class="form-control"
                    id="inputPassword"
                    type="password"
                    placeholder="Password"
                    ngModel
                    required
                    name="password"
                    minlength="6" />
                    <label for="password">Password</label>
                  </div>
                
                <button class="btn btn-primary w-100 mb-2 py-3 shadow-sm" type="submit"
                [disabled]="!autForm.valid">Masuk Sekarang</button>
              </form>
            }
          </div>
          <div class="card-footer border-0">
            <div class="small text-success text-center mb-2">Butuh bantuan? Hubungi Admin!</div>
            <div class="text-muted text-center x-small" style="font-size: 0.75rem;">&copy; {{ tahun }} Bank Data Intelijen Kejaksaan</div>
          </div>
        </div>
      </div>
    </div>
  </div>
